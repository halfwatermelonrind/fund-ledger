name: Update Fund Estimates
on:
  schedule:
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动更新原因'
        required: false
        default: 'Manual trigger'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and process FundGuZhi data
        run: |
          set -e
          curl -s --max-time 60 \
            -H "Referer: https://fund.eastmoney.com/" \
            "https://api.fund.eastmoney.com/FundGuZhi/GetFundGZList?type=1&sort=3&orderType=desc&canbuy=0&pageIndex=1&pageSize=23672" \
            > /tmp/raw.json

          python3 << 'PYEOF'
          import json, re
          with open('/tmp/raw.json') as fp:
              raw = json.load(fp)
          if raw.get('ErrCode') != 0:
              print(f'API error: {raw}')
              exit(1)

          def clean(v):
              if v is None or v == '': return None
              s = str(v).rstrip('%')
              if not re.match(r'^-?\d', s): return None
              try: float(s); return s
              except: return None

          out = {
              'gzrq': raw['Data']['gzrq'],
              'gxrq': raw['Data']['gxrq'],
              'funds': []
          }
          for f in raw['Data']['list']:
              out['funds'].append({
                  'c': f['bzdm'],
                  'n': f['jjjc'],
                  'e': clean(f.get('gsz')),
                  'ez': clean(f.get('gszzl')),
                  'v': f['dwjz'],
                  'vz': clean(f.get('jzzzl')),
                  'd': f['gzrq'],
                  't': f['gxrq'],
              })

          with open('docs/v3/data/fundgz.json', 'w') as fp:
              json.dump(out, fp, separators=(',', ':'), ensure_ascii=False)
          print(f'{len(out["funds"])} funds written')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/v3/data/fundgz.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: update fund estimates $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
